<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Coffee App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Открой рецепты кофе</div>

<div id="categories" class="container">
  <h2>Категории</h2>

  <div class="cards-row">

    <div class="cardClassicCoffee">
      <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=600&q=85" loading="lazy">
      <div class="card-title">Классические кофе</div>
    </div>

    <div class="cardCoffeeWorld">
      <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=600&q=85" loading="lazy">
      <div class="card-title">Кофе мира</div>
    </div>

    <div class="cardColdCoffee">
      <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=600&q=85" loading="lazy">
      <div class="card-title">Холодные кофе</div>
    </div>

    <div class="cardAuthorCoffee">
      <img src="https://images.unsplash.com/photo-1498804103079-a6351b050096?auto=format&fit=crop&w=600&q=85" loading="lazy">
      <div class="card-title">Авторские рецепты</div>
    </div>

    <div class="cardUsefulCoffee">
      <img src="https://images.unsplash.com/photo-1512568400610-62da28bc8a13?auto=format&fit=crop&w=600&q=85" loading="lazy">
      <div class="card-title">Полезные кофе</div>
    </div>
  </div>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
